<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SLM architecture overview and transformer block detail</title>
<desc>Left: input tokens flow through embedding, 6 transformer blocks, final layer norm, LM head to output logits. Right: one block uses pre-norm residual connections around self-attention and MLP sublayers.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-gray rect  { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.c-gray .th   { fill: #444441; }
.c-gray .ts   { fill: #5F5E5A; }
.c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.c-teal .th   { fill: #085041; }
.c-teal .ts   { fill: #0F6E56; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.c-purple .th  { fill: #3C3489; }
.c-purple .ts  { fill: #534AB7; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<line x1="352" y1="8" x2="352" y2="490" stroke="rgba(0,0,0,0.12)" stroke-width="0.5" stroke-dasharray="4 4"/>
<text class="ts" x="185" y="13" text-anchor="middle">overview</text>
<text class="ts" x="505" y="13" text-anchor="middle">block detail</text>
<g class="c-gray"><rect x="85" y="22" width="200" height="52" rx="6"/><text class="th" x="185" y="39" text-anchor="middle" dominant-baseline="central">Input Token IDs</text><text class="ts" x="185" y="58" text-anchor="middle" dominant-baseline="central">(B, T)</text></g>
<line x1="185" y1="74" x2="185" y2="92" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="85" y="92" width="200" height="52" rx="6"/><text class="th" x="185" y="109" text-anchor="middle" dominant-baseline="central">Token + Pos Embedding</text><text class="ts" x="185" y="128" text-anchor="middle" dominant-baseline="central">wte + wpe, dropout</text></g>
<line x1="185" y1="144" x2="185" y2="162" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="85" y="162" width="200" height="96" rx="8" stroke-dasharray="5 3"/><text class="th" x="185" y="194" text-anchor="middle" dominant-baseline="central">Transformer Block</text><text class="ts" x="185" y="220" text-anchor="middle" dominant-baseline="central">× 6 layers</text></g>
<line x1="285" y1="210" x2="412" y2="210" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>
<line x1="185" y1="258" x2="185" y2="278" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="85" y="278" width="200" height="40" rx="6"/><text class="th" x="185" y="298" text-anchor="middle" dominant-baseline="central">Final LayerNorm</text></g>
<line x1="185" y1="318" x2="185" y2="338" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="85" y="338" width="200" height="52" rx="6"/><text class="th" x="185" y="355" text-anchor="middle" dominant-baseline="central">LM Head (Linear)</text><text class="ts" x="185" y="374" text-anchor="middle" dominant-baseline="central">weights ↔ wte</text></g>
<line x1="185" y1="390" x2="185" y2="408" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="85" y="408" width="200" height="52" rx="6"/><text class="th" x="185" y="425" text-anchor="middle" dominant-baseline="central">Output Logits</text><text class="ts" x="185" y="444" text-anchor="middle" dominant-baseline="central">(B, T, 50304)</text></g>
<g class="c-gray"><rect x="414" y="16" width="183" height="455" rx="8" stroke-dasharray="5 3"/><text class="th" x="505" y="38" text-anchor="middle" dominant-baseline="central">Transformer Block</text><text class="ts" x="505" y="56" text-anchor="middle" dominant-baseline="central">× 6 layers</text></g>
<text class="ts" x="505" y="74" text-anchor="middle">x  (input)</text>
<circle cx="505" cy="82" r="3.5" fill="#888780"/>
<path d="M 505 82 L 592 82 L 592 236 L 517 236" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="505" y1="82" x2="505" y2="96" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="425" y="96" width="160" height="40" rx="6"/><text class="th" x="505" y="116" text-anchor="middle" dominant-baseline="central">LayerNorm</text></g>
<line x1="505" y1="136" x2="505" y2="154" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="425" y="154" width="160" height="52" rx="6"/><text class="th" x="505" y="171" text-anchor="middle" dominant-baseline="central">Self-Attention</text><text class="ts" x="505" y="192" text-anchor="middle" dominant-baseline="central">causal, multi-head</text></g>
<line x1="505" y1="206" x2="505" y2="222" class="arr" marker-end="url(#arrow)"/>
<circle cx="505" cy="236" r="12" fill="white" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
<text class="ts" x="505" y="236" text-anchor="middle" dominant-baseline="central">+</text>
<line x1="505" y1="248" x2="505" y2="266" class="arr" marker-end="url(#arrow)"/>
<circle cx="505" cy="254" r="3.5" fill="#888780"/>
<path d="M 505 254 L 592 254 L 592 402 L 517 402" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 2"/>
<g class="c-teal"><rect x="425" y="266" width="160" height="40" rx="6"/><text class="th" x="505" y="286" text-anchor="middle" dominant-baseline="central">LayerNorm</text></g>
<line x1="505" y1="306" x2="505" y2="324" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="425" y="324" width="160" height="52" rx="6"/><text class="th" x="505" y="341" text-anchor="middle" dominant-baseline="central">MLP</text><text class="ts" x="505" y="362" text-anchor="middle" dominant-baseline="central">FC → GELU → FC</text></g>
<line x1="505" y1="376" x2="505" y2="390" class="arr" marker-end="url(#arrow)"/>
<circle cx="505" cy="402" r="12" fill="white" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
<text class="ts" x="505" y="402" text-anchor="middle" dominant-baseline="central">+</text>
<line x1="505" y1="414" x2="505" y2="432" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="505" y="448" text-anchor="middle">x  (output)</text>
</svg>
